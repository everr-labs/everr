[package]
name = "everr-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "everr"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.98"
chrono = "0.4"
clap = { version = "4.5.38", features = ["derive"] }
cliclack = "0.5.2"
dialoguer = "0.11.0"
dirs = "6.0.0"
everr-core = { path = "../../../crates/everr-core" }
flate2 = "1.1"
futures-util = "0.3"
reqwest = { version = "0.12.15", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
regex = "1"
sha2 = "0.10.9"
strip-ansi-escapes = "0.2"
tempfile = "3.18.0"
tokio = { version = "1.44.2", features = ["io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
webbrowser = "1.0.6"

[dependencies.nix]
version = "0.29"
features = [ "signal" ]
default-features = false

[build-dependencies]
serde_json = "1.0.140"

[dev-dependencies]
assert_cmd = "2.0.16"
libc = "0.2"
mockito = "1.7.0"
predicates = "3.1.3"
reqwest = { version = "0.12", features = ["blocking"] }
serde_json = "1.0"
tempfile = "3.18.0"
