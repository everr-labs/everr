[package]
name = "everr-app"
version = "0.1.18"
description = "Everr app"
authors = [ "Everr" ]
edition = "2021"

[lib]
name = "everr_app_lib"
crate-type = [ "staticlib", "cdylib", "rlib" ]

[build-dependencies.tauri-build]
version = "2"
features = []

[dependencies]
arboard = "3.6.1"
anyhow = "1.0.98"
futures-util = "0.3"
dirs = "6.0.0"
serde_json = "1"
sha2 = "0.10.9"
tauri-plugin-autostart = "2"
tauri-plugin-updater = "2"
webbrowser = "1.0.6"
url = "2"

[dependencies.everr-core]
path = "../../../crates/everr-core"

[dependencies.serde]
version = "1"
features = [ "derive" ]

[dependencies.tauri]
version = "2"
features = [ "tray-icon", "macos-private-api" ]

[dependencies.time]
version = "0.3"
features = [ "formatting" ]

[dependencies.tokio]
version = "1.44.2"
features = [ "time", "sync", "macros" ]

[target."cfg(target_os = \"macos\")".dependencies]
objc2-app-kit = "0.3.2"

[dev-dependencies]
tempfile = "3.18.0"
