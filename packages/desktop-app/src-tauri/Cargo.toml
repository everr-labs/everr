[package]
name = "everr-app"
version = "0.1.28"
description = "Everr app"
authors = [ "Everr" ]
edition = "2021"

[lib]
name = "everr_app_lib"
crate-type = [ "staticlib", "cdylib", "rlib" ]

[build-dependencies]
serde_json = "1"

[build-dependencies.tauri-build]
version = "2"
features = []

[dependencies]
arboard = "3.6.1"
anyhow = "1.0.98"
futures-util = "0.3"
dirs = "6.0.0"
opentelemetry = "0.31"
serde_json = "1"
sha2 = "0.10.9"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"
tracing = "0.1"
tracing-opentelemetry = "0.32"
webbrowser = "1.0.6"
url = "2"

[dependencies.nix]
version = "0.29"
features = [ "signal" ]
default-features = false

[dependencies.opentelemetry-appender-tracing]
version = "0.31"
features = [ "experimental_use_tracing_span_context" ]

[dependencies.opentelemetry-otlp]
version = "0.31"
default-features = false
features = [ "http-proto", "reqwest-blocking-client", "logs", "trace", "internal-logs" ]

[dependencies.opentelemetry_sdk]
version = "0.31"
features = [ "rt-tokio" ]

[dependencies.reqwest]
version = "0.12"
default-features = false
features = [ "rustls-tls" ]

[dependencies.tracing-subscriber]
version = "0.3"
features = [ "env-filter", "fmt" ]

[dependencies.everr-core]
path = "../../../crates/everr-core"

[dependencies.serde]
version = "1"
features = [ "derive" ]

[dependencies.tauri]
version = "2"
features = [ "tray-icon", "macos-private-api" ]

[dependencies.time]
version = "0.3"
features = [ "formatting" ]

[dependencies.tokio]
version = "1.44.2"
features = [ "time", "sync", "macros", "process", "io-util" ]

[target."cfg(target_os = \"macos\")".dependencies]
objc2 = "0.6.4"
objc2-app-kit = "0.3.2"

[dev-dependencies]
prost = "0.14"
tempfile = "3.18.0"
wiremock = "0.6"

[dev-dependencies.opentelemetry-proto]
version = "0.31"
features = [ "gen-tonic" ]
