receivers:
  githubactions:
    # secret: my-secret
    # custom_service_name: github // default org-repo-name
    # service_name_prefix: foo-   // ignored if custom_service_name set
    # service_name_suffix: -bar   // ignored if custom_service_name set
    # gh_api:
    #   base_url: https://gh_enterprise.base.url      // Enterprise GitHub base URL. Omit for github.com
    #   upload_url: https://gh_enterprise.upload.url  // Enterprise GitHub upload URL. Omit for github.com
    #   auth:
    #     app_id: 123                         // App ID for GitHub App.
    #     private_key_path: /path/to/key.pem  // Path to private key for GitHub App.
    # tenant_resolution:
    #   postgres_dsn: postgresql://user:pass@localhost:5432/citric?sslmode=disable
    # event_forwarding:
    #   installation_events_url: https://app.example.com/api/github/install-events
    #   timeout: 5s
    cors:
      allowed_origins: ["*"]
      allowed_headers: ["*"]
  otlp:
    protocols:
      grpc:
      http:

processors:
  # batch:

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [githubactions, otlp]
      # processors: [batch]
      exporters: [debug]
