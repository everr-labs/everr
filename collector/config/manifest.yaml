dist:
  name: citric-collector
  description: CI/CD OpenTelemetry Collector
  output_path: ./build
  debug_compilation: false
  version: 0.1.0
  otelcol_version: 0.144.0


exporters:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/clickhouseexporter v0.144.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.145.0

connectors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/spanmetricsconnector v0.144.0
  - gomod: github.com/get-citric/citric/collector/connector/testlogstotraces v0.145.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.144.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.144.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.144.0

receivers:
  - gomod: github.com/get-citric/citric/collector/receiver/githubactionsreceiver v0.145.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.26.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.26.0

replaces:
  - github.com/get-citric/citric/collector/receiver/githubactionsreceiver => ../receiver/githubactionsreceiver
  - github.com/get-citric/citric/collector/internal/sharedcomponent => ../internal/sharedcomponent
  - github.com/get-citric/citric/collector/connector/testlogstotraces => ../connector/testlogstotraces
  - github.com/get-citric/citric/collector/semconv => ../semconv
