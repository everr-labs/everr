dist:
  name: ci-otelcol
  description: CI/CD OpenTelemetry Collector
  output_path: ./build
  otelcol_version: 0.106.1
  debug_compilation: false
  version: 0.1.0

exporters:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/clickhouseexporter v0.106.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.106.1

connectors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/spanmetricsconnector v0.106.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/routingconnector v0.106.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.106.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.106.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.106.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.106.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.106.1
  - gomod: github.com/Elfo404/cicdo11y/collector/receiver/githubactionsreceiver v0.106.1

replaces:
  - github.com/Elfo404/cicdo11y/collector/receiver/githubactionsreceiver => ../receiver/githubactionsreceiver
  - github.com/Elfo404/cicdo11y/collector/internal/sharedcomponent => ../internal/sharedcomponent

excludes:
  - github.com/knadh/koanf v1.5.0
