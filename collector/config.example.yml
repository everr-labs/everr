receivers:
  githubactions:
    path: /webhook/github
    endpoint: 0.0.0.0:8080
    secret: WEBHOOKSECRETFROMGHAPP
    gh_api:
      auth:
        app_id: 1234
        private_key_path: /etc/everr-collector/dev-everr-app.pem

processors:
  batch:
  resource:
    attributes:
      - action: insert
        key: ci.github.workflow.name
        from_attribute: ci.github.workflow.run.name
      - action: delete
        key: ci.github.workflow.run.name
      - action: upsert
        key: everr.tenant.id
        from_context: metadata.x-everr-tenant-id
      - action: convert
        key: everr.tenant.id
        converted_type: int

exporters:
  debug:
    verbosity: detailed
  clickhouse:
    endpoint: http://clickhouse:8123
    username: collector_rw
    password: collector-dev
    database: otel
    create_schema: false
    ttl: 72h

service:
  pipelines:
    traces:
      receivers: [githubactions]
      processors: [resource, batch]
      exporters: [clickhouse, debug]
    logs:
      receivers: [githubactions]
      processors: [resource, batch]
      exporters: [clickhouse, debug]

  telemetry:
    metrics:
      level: detailed
    logs:
      level: debug
      encoding: "json"
