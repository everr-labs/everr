extensions:

receivers:
  githubactions:
    path: /webhook/github
    endpoint: 0.0.0.0:3333
    secret: WEBHOOKSECRETFROMGHAPP
    gh_api:
      auth:
        app_id: 1234
        private_key_path: /path/to/key.pem
    tenant_resolution:
      postgres_dsn: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
    event_forwarding:
      installation_events_url: https://app.example.com/api/github/install-events
      timeout: 5s

processors:
  batch:

  resource:
    attributes:
      - action: insert
        key: ci.github.workflow.name
        from_attribute: ci.github.workflow.run.name
      - action: delete
        key: ci.github.workflow.run.name

exporters:
  debug:
    verbosity: detailed
  clickhouse:
    endpoint: "http://localhost:8123"
    username: "collector_rw"
    password: "change-me-strong"
    database: "otel"
    create_schema: false
    ttl: 72h

service:
  extensions: [basicauth/grafana_cloud]
  pipelines:
    traces:
      receivers: [githubactions]
      processors: [resource]
      exporters: [clickhouse, debug]
    logs:
      receivers: [githubactions]
      processors: []
      exporters: [clickhouse, debug]

  telemetry:
    metrics:
      level: detailed
    logs:
      level: debug
      encoding: "json"
