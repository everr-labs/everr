extensions:
  basicauth/grafana_cloud:
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/extension/basicauthextension
    client_auth:
      username: '12345'
      password: 'TOKEN'

receivers:
  githubactions:
    path: /webhook/github
    endpoint: 0.0.0.0:3333
    secret: WEBHOOKSECRETFROMGHAPP
    gh_api:
      auth:
        app_id: 1234
        installation_id: 6578
        private_key_path: /path/to/key.pem

processors:
  batch:

  resource:
    attributes:
      - action: insert
        key: ci.github.workflow.name
        from_attribute: ci.github.workflow.run.name
      - action: delete
        key: ci.github.workflow.run.name

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [5s, 15s, 30s, 1m, 5m, 10m, 30m]
      unit: s
    aggregation_temporality: 'AGGREGATION_TEMPORALITY_CUMULATIVE'
    exemplars:
      enabled: true

exporters:
  debug:
    verbosity: detailed
  clickhouse:
    endpoint: 'http://localhost:8123'
    username: 'default'
    database: 'default'
    # TODO: double check the following
    async_insert: false
  otlphttp/grafana_cloud:
    endpoint: 'https://otlp-gateway-prod-us-central-0.grafana.net/otlp'
    auth:
      authenticator: basicauth/grafana_cloud

service:
  extensions: [basicauth/grafana_cloud]
  pipelines:
    traces:
      receivers: [otlp, githubactions]
      processors: [resource]
      exporters: [spanmetrics, clickhouse, otlphttp/grafana_cloud, debug]
    logs:
      receivers: [otlp, githubactions]
      processors: []
      exporters: [clickhouse, otlphttp/grafana_cloud, debug]
    metrics:
      receivers: [spanmetrics]
      processors: []
      exporters: [clickhouse, otlphttp/grafana_cloud, debug]

  telemetry:
    metrics:
      level: detailed
    logs:
      level: debug
      encoding: 'json'
