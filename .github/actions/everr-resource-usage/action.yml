name: Everr Resource Usage
description: Collect per-job machine resource usage and upload a best-effort artifact

inputs:
  check-run-id:
    description: Check run id for the current job, usually `${{ job.check_run_id }}`
    required: true

runs:
  using: node24
  main: dist/index.js
  post: dist/index.js
  post-if: always()
