name: Everr Resource Usage Start
description: Start background resource-usage sampling for the current job

inputs:
  sample-interval-seconds:
    description: Sampling interval in seconds
    required: false
    default: "5"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        if [[ "${RUNNER_OS:-}" != "Linux" ]]; then
          echo "resource-usage sampling is supported only on Linux runners"
          {
            echo "EVERR_RESOURCE_USAGE_ENABLED=0"
            echo "EVERR_RESOURCE_USAGE_PARTIAL_DIR="
          } >> "$GITHUB_ENV"
          exit 0
        fi

        interval="${{ inputs.sample-interval-seconds }}"
        base_dir="${RUNNER_TEMP}/everr-resource-usage/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
        samples_path="${base_dir}/samples.ndjson"
        sampler_path="${base_dir}/sampler.sh"
        pid_path="${base_dir}/sampler.pid"
        log_path="${base_dir}/sampler.log"
        workspace_path="${GITHUB_WORKSPACE:-$PWD}"
        started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

        mkdir -p "$base_dir"

        cat > "$sampler_path" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        samples_path="$1"
        workspace_path="$2"
        interval="$3"

        read_cpu_counters() {
          awk '
            NR == 1 {
              idle = $5 + $6
              total = 0
              for (i = 2; i <= NF; i++) {
                total += $i
              }
              print total, idle
              exit
            }
          ' /proc/stat
        }

        emit_sample() {
          local cpu_pct="$1"
          local timestamp
          local mem_total_kb
          local mem_available_kb
          local mem_used_bytes
          local mem_available_bytes
          local disk_used_kb
          local disk_available_kb
          local disk_used_bytes
          local disk_available_bytes
          local disk_utilization_pct
          local load1

          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          read -r mem_total_kb mem_available_kb < <(
            awk '
              /^MemTotal:/ { total = $2 }
              /^MemAvailable:/ { available = $2 }
              END { print total, available }
            ' /proc/meminfo
          )
          mem_used_bytes=$(((mem_total_kb - mem_available_kb) * 1024))
          mem_available_bytes=$((mem_available_kb * 1024))

          read -r disk_used_kb disk_available_kb < <(
            df -Pk -- "$workspace_path" | awk 'NR == 2 { print $3, $4 }'
          )
          disk_used_bytes=$((disk_used_kb * 1024))
          disk_available_bytes=$((disk_available_kb * 1024))
          disk_utilization_pct="$(
            awk -v used="$disk_used_bytes" -v available="$disk_available_bytes" '
              BEGIN {
                total = used + available
                if (total <= 0) {
                  printf "0.00"
                } else {
                  printf "%.2f", (used / total) * 100
                }
              }
            '
          )"
          load1="$(awk '{ print $1 }' /proc/loadavg)"

          printf '{"timestamp":"%s","cpuUtilizationPct":%s,"memoryUsedBytes":%s,"memoryAvailableBytes":%s,"diskUsedBytes":%s,"diskAvailableBytes":%s,"diskUtilizationPct":%s,"load1":%s}\n' \
            "$timestamp" \
            "$cpu_pct" \
            "$mem_used_bytes" \
            "$mem_available_bytes" \
            "$disk_used_bytes" \
            "$disk_available_bytes" \
            "$disk_utilization_pct" \
            "$load1" >> "$samples_path"
        }

        mkdir -p "$(dirname "$samples_path")"
        read -r prev_total prev_idle < <(read_cpu_counters)
        emit_sample "0.00"

        while true; do
          sleep "$interval"
          read -r current_total current_idle < <(read_cpu_counters)
          cpu_pct="$(
            awk \
              -v prev_total="$prev_total" \
              -v prev_idle="$prev_idle" \
              -v current_total="$current_total" \
              -v current_idle="$current_idle" '
                BEGIN {
                  delta_total = current_total - prev_total
                  delta_idle = current_idle - prev_idle
                  if (delta_total <= 0) {
                    printf "0.00"
                  } else {
                    printf "%.2f", ((delta_total - delta_idle) / delta_total) * 100
                  }
                }
              '
          )"
          emit_sample "$cpu_pct"
          prev_total="$current_total"
          prev_idle="$current_idle"
        done
        EOF

        chmod +x "$sampler_path"
        : > "$samples_path"

        nohup "$sampler_path" "$samples_path" "$workspace_path" "$interval" \
          > "$log_path" 2>&1 < /dev/null &
        echo "$!" > "$pid_path"

        {
          echo "EVERR_RESOURCE_USAGE_ENABLED=1"
          echo "EVERR_RESOURCE_USAGE_BASE_DIR=$base_dir"
          echo "EVERR_RESOURCE_USAGE_SAMPLES_PATH=$samples_path"
          echo "EVERR_RESOURCE_USAGE_PID_PATH=$pid_path"
          echo "EVERR_RESOURCE_USAGE_LOG_PATH=$log_path"
          echo "EVERR_RESOURCE_USAGE_INTERVAL_SECONDS=$interval"
          echo "EVERR_RESOURCE_USAGE_STARTED_AT=$started_at"
          echo "EVERR_RESOURCE_USAGE_WORKSPACE_PATH=$workspace_path"
          echo "EVERR_RESOURCE_USAGE_PARTIAL_DIR="
        } >> "$GITHUB_ENV"
