name: Everr Action
description: Everr CI helpers. Capabilities are opt-in via inputs.

inputs:
  resource-usage:
    description: Collect per-job machine resource usage and upload a best-effort artifact
    required: false
    default: "false"
  check-run-id:
    description: Check run id for the current workflow job. Required when resource-usage is true.
    required: false
    default: ""

runs:
  using: node24
  main: dist/index.js
  post: dist/index.js
  post-if: always()
