name: Build & Publish Everr CLI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-publish-everr-cli.yml
      - everr-cli/**
      - packages/docs/content/docs/cli/**

jobs:
  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: everr-cli

      - name: Build release binary
        run: cargo build --release --manifest-path everr-cli/Cargo.toml

      - name: Smoke test
        run: ./everr-cli/target/release/everr --help

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          cp ./everr-cli/target/release/everr ./dist/everr-darwin-arm64
          (
            cd dist
            shasum -a 256 everr-darwin-arm64 > everr-darwin-arm64.sha256
          )

          BUILD_TIME_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > ./dist/metadata.json <<EOF
          {
            "git_sha": "${GITHUB_SHA}",
            "build_time_utc": "${BUILD_TIME_UTC}"
          }
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: everr-cli-darwin-arm64
          path: dist/*
          if-no-files-found: error

  publish-to-github-releases:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-macos-arm64
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: everr-cli-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: everr-cli-darwin-arm64
          path: dist

      - name: Validate release configuration
        run: |
          set -euo pipefail
          for required in GH_TOKEN RELEASE_TAG; do
            if [ -z "${!required:-}" ]; then
              echo "Missing required value: ${required}" >&2
              exit 1
            fi
          done

      - name: Publish release assets
        run: |
          set -euo pipefail

          GIT_SHA="$(python3 -c 'import json; print(json.load(open("dist/metadata.json"))["git_sha"])')"
          if [ -z "${GIT_SHA}" ] || [ "${GIT_SHA}" = "null" ]; then
            echo "Unable to parse git_sha from dist/metadata.json" >&2
            exit 1
          fi

          git fetch --tags origin
          git tag -f "${RELEASE_TAG}" "${GIT_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}" --force

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Everr CLI Main Build" \
              --notes "Latest Everr CLI main build for macOS arm64."
          else
            gh release create "${RELEASE_TAG}" \
              --title "Everr CLI Main Build" \
              --notes "Latest Everr CLI main build for macOS arm64." \
              --prerelease
          fi

          gh release upload "${RELEASE_TAG}" \
            ./dist/everr-darwin-arm64 \
            ./dist/everr-darwin-arm64.sha256 \
            --clobber

      - name: Verify release URLs
        run: |
          set -euo pipefail
          curl -fI "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/everr-darwin-arm64"
          curl -fI "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/everr-darwin-arm64.sha256"
