name: Build & Test App

concurrency:
  # For pushes, this lets concurrent runs happen, so each push gets a result.
  # But for other events (e.g. PRs), we can cancel the previous runs.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - .github/workflows/build-and-test-app.yml
      - .nvmrc
      - biome.json
      - package.json
      - packages/app/**
      - packages/datemath/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - vitest.config.ts

  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-test-app.yml
      - .nvmrc
      - biome.json
      - package.json
      - packages/app/**
      - packages/datemath/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - vitest.config.ts

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r --filter @everr/datemath build

      - name: Lint
        run: pnpm exec biome check packages/app packages/datemath

      - name: Typecheck
        run: pnpm -r --filter @everr/app... typecheck

      - name: Test
        run: pnpm -r --filter @everr/app... test

      - name: Generate migrations
        run: |
          DATABASE_HOST="localhost", DATABASE_NAME="mock", DATABASE_PORT="5432", DATABASE_USER="postgres", DATABASE_PASSWORD="postgres" pnpm -r --filter @everr/app db:generate

      - name: Ensure no unstaged/changed files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "❌ Uncommitted migrations. run 'pnpm db:generate' and commit the changes."
            git status --porcelain
            git diff
            exit 1
          fi
      - name: Build
        run: pnpm -r --filter @everr/app build
