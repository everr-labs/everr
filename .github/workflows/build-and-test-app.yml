name: Build & Test App

concurrency:
  # For pushes, this lets concurrent runs happen, so each push gets a result.
  # But for other events (e.g. PRs), we can cancel the previous runs.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    paths:
      - .github/**
      - packages/app/**
      - pnpm-lock.yaml
      - biome.json

  push:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: build packages
        run: pnpm -C packages/datemath build

      - name: Lint
        run: pnpm check

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test

      - name: Generate migrations
        run: |
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/mock" pnpm -C packages/app db:generate

      - name: Ensure no unstaged/changed files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "❌ Uncommitted migrations. run 'pnpm db:generate' and commit the changes."
            git status --porcelain
            git diff
            exit 1
          fi
      - name: Build
        run: pnpm -C packages/app build
