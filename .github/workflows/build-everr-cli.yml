name: Everr CLI CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - .github/workflows/build-everr-cli.yml
      - packages/desktop-app/src-cli/**
      - packages/desktop-app/scripts/build-cli.sh
      - packages/docs/Dockerfile
      - packages/docs/public/install.sh
      - packages/docs/content/docs/cli/**
  push:
    branches: [main]
    paths:
      - .github/workflows/build-everr-cli.yml
      - packages/desktop-app/src-cli/**
      - packages/desktop-app/scripts/build-cli.sh
      - packages/docs/Dockerfile
      - packages/docs/public/install.sh
      - packages/docs/content/docs/cli/**

jobs:
  build:
    name: Build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect resource usage
        uses: ./.github/actions/everr-resource-usage
        with:
          check-run-id: ${{ job.check_run_id }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Test
        run: cargo +nightly test --manifest-path packages/desktop-app/src-cli/Cargo.toml -- --report-time -Z unstable-options

      - name: Build release binary
        run: cargo build --release --manifest-path packages/desktop-app/src-cli/Cargo.toml

      - name: Smoke test
        run: ./target/release/everr --help
