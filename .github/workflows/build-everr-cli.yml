name: Everr CLI CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - .github/workflows/build-everr-cli.yml
      - crates/everr-cli/**
      - packages/docs/Dockerfile
      - packages/docs/public/install.sh
      - packages/docs/content/docs/cli/**
  push:
    branches: [main]
    paths:
      - .github/workflows/build-everr-cli.yml
      - crates/everr-cli/**
      - packages/docs/Dockerfile
      - packages/docs/public/install.sh
      - packages/docs/content/docs/cli/**

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/everr-cli

      - name: Test
        run: cargo test -p everr-cli --manifest-path Cargo.toml -- --report-time -Z unstable-options

      - name: Build release binary
        run: cargo build --release -p everr-cli --manifest-path Cargo.toml

      - name: Smoke test
        run: ./target/release/everr --help
