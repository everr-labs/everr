name: Build & Test Collector
defaults:
  run:
    working-directory: ./collector

concurrency:
  # For pushes, this lets concurrent runs happen, so each push gets a result.
  # But for other events (e.g. PRs), we can cancel the previous runs.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  pull_request:
    paths:
      - .github/workflows/build-and-test-collector.yml
      - collector/**
      - crates/everr-core/build/ai_instructions_schema.md

  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-test-collector.yml
      - collector/**
      - crates/everr-core/build/ai_instructions_schema.md

jobs:
  install-tools:
    name: Install Tools
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect resource usage
        uses: ./.github/actions/everr-resource-usage
        with:
          check-run-id: ${{ job.check_run_id }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: collector/go.mod
          cache: false

      - name: Cache Go and Tools
        id: cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/go/pkg/mod
            ~/.cache/go-build
            ./collector/.tools
          key: go-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-
      - name: Warm module cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: go mod download

      - name: Make install-tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: make install-tools

  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: install-tools
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect resource usage
        uses: ./.github/actions/everr-resource-usage
        with:
          check-run-id: ${{ job.check_run_id }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: collector/go.mod
          cache: false

      - name: Cache Go
        id: cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/go/pkg/mod
            ~/.cache/go-build
            ./collector/.tools
          key: go-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-
      - name: Warm module cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: go mod download

      - name: Make lint-all
        run: make lint-all

      - name: Check formatting
        run: |
          make fmt-all
          git diff -s --exit-code || (echo 'Code is not formatted. Run make fmt-all and commit the changes' && exit 1)

      - name: Check Code Generation
        run: |
          make generate
          git diff -s --exit-code || (echo 'Generated code is out of date. Run make generate and commit the changes' && exit 1)

      - name: Check packages are up-to-date
        run: |
          make tidy-all
          git diff -s --exit-code || (echo 'Packages are out of date. Run make tidy-all and commit the changes' && exit 1)

      - name: Check crosslink run
        run: |
          make crosslink
          git diff -s --exit-code || (echo 'Replace statements not updated. Run make crosslink and commit the changes' && exit 1)

  build:
    name: Build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: install-tools
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect resource usage
        uses: ./.github/actions/everr-resource-usage
        with:
          check-run-id: ${{ job.check_run_id }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: collector/go.mod
          cache: false

      - name: Cache Go
        id: cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/go/pkg/mod
            ~/.cache/go-build
            ./collector/.tools
          key: go-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-
      - name: Warm module cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: go mod download

      - name: Make build
        run: make build

  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: install-tools
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect resource usage
        uses: ./.github/actions/everr-resource-usage
        with:
          check-run-id: ${{ job.check_run_id }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: collector/go.mod
          cache: false

      - name: Cache Go
        id: cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/go/pkg/mod
            ~/.cache/go-build
            ./collector/.tools
          key: go-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-
      - name: Warm module cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: go mod download

      - name: Make test-all
        run: make test-all

  build-local-macos:
    name: Build Local + Drift Check (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect resource usage
        uses: ./.github/actions/everr-resource-usage
        with:
          check-run-id: ${{ job.check_run_id }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: collector/go.mod
          cache: false

      - name: Cache Go
        id: cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/go/pkg/mod
            ~/.cache/go-build
            ./collector/.tools
          key: go-cache-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-${{ runner.os }}-

      - name: Warm module cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: go mod download

      - name: Make install-tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: make install-tools

      - name: Install libchdb
        run: |
          curl -sL https://lib.chdb.io | bash
          echo "CHDB_LIB_PATH=$PWD/libchdb.so" >> "$GITHUB_ENV"

      - name: Make build-local
        run: make build-local

      - name: Run local collector smoke tests
        run: go test ./test/smoke/... -v

      - name: Check ai-instructions schema drift
        run: |
          go run ./cmd/genaischema \
            --binary build-local/everr-local-collector \
            --out /tmp/new-schema.md
          diff -u ../crates/everr-core/build/ai_instructions_schema.md /tmp/new-schema.md
