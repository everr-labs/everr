services:
  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - '8123:8123'
    volumes:
      - ./volumes/clickhouse:/var/lib/clickhouse
  postgres:
    image: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
